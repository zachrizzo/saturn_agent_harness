<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- planet body -->
  <circle cx="32" cy="32" r="13" fill="#a78bfa"/>
  <!-- ring shadow on planet -->
  <ellipse cx="32" cy="36" rx="11" ry="3.5" fill="#7c3aed" opacity="0.5"/>
  <!-- ring back half -->
  <ellipse cx="32" cy="32" rx="22" ry="6" fill="none" stroke="#c4b5fd" stroke-width="3.5" stroke-dasharray="34.5 34.5" stroke-dashoffset="0" opacity="0.6"/>
  <!-- planet on top of back ring -->
  <circle cx="32" cy="32" r="13" fill="#a78bfa"/>
  <!-- ring front half -->
  <ellipse cx="32" cy="32" rx="22" ry="6" fill="none" stroke="#ede9fe" stroke-width="3.5" stroke-dasharray="34.5 34.5" stroke-dashoffset="34.5"/>
  <!-- subtle surface shading -->
  <ellipse cx="27" cy="27" rx="5" ry="4" fill="#c4b5fd" opacity="0.35"/>
</svg>
